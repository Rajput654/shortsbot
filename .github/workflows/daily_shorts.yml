name: Daily Animal Shorts Bot

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg fonts-liberation
          echo "FFMPEG_PATH=$(which ffmpeg)" >> $GITHUB_ENV
          echo "FFPROBE_PATH=$(which ffprobe)" >> $GITHUB_ENV

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download font
        run: |
          mkdir -p assets
          wget -q "https://github.com/JulietaUla/Montserrat/raw/master/fonts/ttf/Montserrat-Bold.ttf" -O assets/font.ttf || echo "Font skipped"

      - name: Create output directory
        run: mkdir -p output

      - name: Run bot
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YT_CREDENTIALS: ${{ secrets.YT_CREDENTIALS }}
          FFMPEG_PATH: ${{ env.FFMPEG_PATH }}
          FFPROBE_PATH: ${{ env.FFPROBE_PATH }}
          VIDEOS_PER_DAY: "4"
          TTS_VOICE: "en-US-AndrewNeural"
          YT_CATEGORY: "15"
        run: python main.py
